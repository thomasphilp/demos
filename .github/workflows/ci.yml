name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate HTML & Check Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: html-validate services-simplified.html accessorials-form.html

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --exclude-loopback '*.html'
          fail: true
